<style>
/* ── Oculta el navbar de Quarto si quedase ── */
.navbar { display: none !important; }
#quarto-header { display: none !important; }

/* ── Barra blanca logos ── */
#site-header {
  background: white;
  border-bottom: 1px solid #dde3ed;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  position: sticky;
  top: 0;
  z-index: 1000;
  width: 100%;
  margin-bottom: 0 !important;
  padding-bottom: 0 !important;
  top: 0 !important;
}

#header-logos {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 0.6rem 2rem;
  max-width: 100%;
}

#header-logos img {
  height: 52px;
  object-fit: contain;
  transition: opacity 0.2s;
}

#header-logos img:hover { opacity: 0.85; }

.header-sep {
  width: 1px;
  height: 44px;
  background: #dde3ed;
}

/* ── Barra azul navegación ── */
#site-nav {
  background: #003087;
  border-bottom: 3px solid #0072bc;
  box-shadow: 0 2px 8px rgba(0,48,135,0.2);
  position: sticky;
  top: 76px;
  z-index: 999;
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  position: relative;
  left: 0;
  margin-top: 0 !important;
  top: 0;
}

#site-nav-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  gap: 0;
  width: 100%;
}

#site-nav .nav-link {
  font-family: 'Open Sans', Arial, sans-serif;
  color: rgba(255,255,255,0.88);
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 0.85rem 1.1rem;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  display: block;
}

#site-nav .nav-link:hover {
  color: white;
  border-bottom-color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.07);
}

/* Resalta la página activa */
#site-nav .nav-link.active {
  color: white;
  border-bottom-color: white;
}

/* ── Ajusta el contenido para no quedar tapado ── */
#quarto-content {
  margin-top: 0 !important;
  padding-top: 0 !important;
}

@media (max-width: 768px) {
  #header-logos { padding: 0.5rem 1rem; }
  #header-logos img { height: 38px; }
  #site-nav-inner { flex-wrap: wrap; padding: 0 1rem; }
  #site-nav .nav-link { font-size: 0.78rem; padding: 0.6rem 0.7rem; }

</style>

<script>
/* Resalta el enlace activo según la URL */
document.addEventListener('DOMContentLoaded', function() {
  const links = document.querySelectorAll('#site-nav .nav-link');
  const current = window.location.pathname.split('/').pop() || 'index.html';
  links.forEach(link => {
    if (link.getAttribute('href') === current) {
      link.classList.add('active');
    }
  });
});
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.body.style.paddingTop = '0';
  document.body.style.marginTop = '0';
  // Quarto añade padding-top inline al body, este lo sobreescribe
  document.body.setAttribute('style', 
    document.body.getAttribute('style') + '; padding-top: 0 !important; margin-top: 0 !important;'
  );
});
</script>
